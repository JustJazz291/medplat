<div class="modal-header">
    <h5 class="modal-title">QR Attendance (Prototype)</h5>
    <button type="button" class="close" ng-click="$ctrl.close()">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body text-center">
    <p class="mb-2">Scan this QR code within 2 minutes to mark attendance.</p>
    <div ng-if="$ctrl.qrImageBase64">
        <img ng-src="{{'data:image/png;base64,' + $ctrl.qrImageBase64}}" alt="QR Code"
             style="max-width: 250px; max-height: 250px;"/>
    </div>
    <div class="mt-2">
        <small>Token: {{$ctrl.qrToken}}</small><br/>
        <small>Expires at: {{$ctrl.expiresAt | date:'medium'}}</small>
    </div>
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-secondary" ng-click="$ctrl.close()">Close</button>
</div>
